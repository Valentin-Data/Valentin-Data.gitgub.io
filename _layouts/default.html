<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

    <video autoplay loop muted playsinline id="background-video">
      <source src="{{ '/assets/video/videoplayback.mp4' | absolute_url }}" type="video/mp4">
    </video>

    <main>
        {{ content }}
    </main>

    <div id="chatbot" style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; text-align: right;">
  <div id="chat-bubble" onclick="openChat()" style="background: #00f2ff; color: #0b0e14; padding: 15px; border-radius: 50px; cursor: pointer; font-weight: bold;">
    ¿Necesitas ayuda? 💬
  </div>
  
  <div id="chat-window" style="display: none; width: 250px; background: rgba(11, 14, 20, 0.95); border: 1px solid #00f2ff; padding: 15px; border-radius: 10px; margin-bottom: 10px; color: white;">
    <p>¡Hola! Soy el asistente de Valentín.</p>
    <p style="font-size: 0.9em; border-top: 1px solid #444; pt: 10px;">
       <strong>Data Analytics:</strong> Es transformar datos en decisiones estratégicas. Mi meta es optimizar procesos mediante análisis preciso.
    </p>
    <button onclick="closeChat()" style="background: transparent; color: #00f2ff; border: 1px solid #00f2ff; cursor: pointer;">Cerrar</button>
  </div>
</div>

<script>
  function openChat() { document.getElementById('chat-window').style.display = 'block'; }
  function closeChat() { document.getElementById('chat-window').style.display = 'none'; }
</script>

</body>
</html>
