<script>
  // 1. Alternar Menú
  function toggleMenu() {
    var menu = document.getElementById('nav-menu');
    menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
  }

  // 2. Mostrar sección y limpiar todo lo demás
  function showSection(id) {
    // Ocultar todas las secciones
    document.querySelectorAll('section').forEach(function(s) {
        s.style.display = 'none';
    });
    // Mostrar la seleccionada
    var target = document.getElementById(id);
    if(target) target.style.display = 'flex';
    
    // Cerrar menú y chatbot al navegar
    document.getElementById('nav-menu').style.display = 'none';
    document.getElementById('chat-window').style.display = 'none';
  }

  // 3. Lógica del Chatbot
  function openChat() {
    var chat = document.getElementById('chat-window');
    chat.style.display = (chat.style.display === 'block') ? 'none' : 'block';
  }

  // 4. Cerrar al hacer clic fuera (Menú y Chat)
  document.addEventListener('click', function(event) {
    var menu = document.getElementById('nav-menu');
    var chat = document.getElementById('chat-window');
    var chatBubble = document.getElementById('chat-bubble');
    var menuBtn = document.querySelector('[onclick="toggleMenu()"]');
    
    if (menu && !menu.contains(event.target) && event.target !== menuBtn) {
        menu.style.display = 'none';
    }
    if (chat && !chat.contains(event.target) && event.target !== chatBubble) {
        chat.style.display = 'none';
    }
  });
</script>
